<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrewMatch v2</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <main class="container">

    <header class="hero">
      <h1>✈️ CrewMatch</h1>
      <p>
        La forma más inteligente de encontrar tiempo libre con tu pareja,
        amigos o tripulación.
      </p>
    </header>

    <section class="card">

      <h2>¿Cómo quieres comparar?</h2>

      <div class="modes">

        <button class="mode active">
          ❤️ Pareja
        </button>

        <button class="mode">
          👥 Grupo
        </button>

      </div>

    </section>

    <section class="card">

      <h2>Sube los roles</h2>

      <label>Rol 1</label>
      <input type="file" accept=".ics">

      <label>Rol 2</label>
      <input type="file" accept=".ics">

      <button class="analyze">
        Analizar
      </button>

    </section>

    <section class="card">

      <h2>Dashboard</h2>

      <div id="dashboard">
        Próximamente...
      </div>

    </section>

  </main>

  <script src="js/app.js"></script>

</body>

</html>
