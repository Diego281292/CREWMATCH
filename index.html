
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CrewMatch</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;background:#071021;color:white;margin:0;padding:20px}
    .card{background:#121a2d;border:1px solid #27324a;border-radius:18px;padding:16px;margin:14px 0}
    input,button{width:100%;padding:14px;margin-top:8px;border-radius:12px;border:0}
    button{background:#3b82f6;color:white;font-weight:bold}
    .stat{background:#0b1224;border-radius:14px;padding:14px;margin:8px 0}
  </style>
</head>
<body>
  <h1>✈️ CrewMatch</h1>
  <p>Compara dos roles .ICS y encuentra días libres juntos.</p>

  <div class="card">
    <h3>Rol 1</h3>
    <input id="file1" type="file" accept=".ics">
    <h3>Rol 2</h3>
    <input id="file2" type="file" accept=".ics">
    <button onclick="analyze()">Analizar roles</button>
  </div>

  <div id="result"></div>

<script>
function readFile(id){
  return new Promise((resolve,reject)=>{
    const file=document.getElementById(id).files[0];
    if(!file) reject("Falta subir un archivo");
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.readAsText(file);
  });
}

function parseDaysOff(text){
  const events=[...text.matchAll(/BEGIN:VEVENT([\s\S]*?)END:VEVENT/g)];
  const days=[];
  events.forEach(e=>{
    const block=e[1];
    const summary=(block.match(/SUMMARY:(.*)/)||[])[1]||"";
    const date=(block.match(/DTSTART;VALUE=DATE:(\d{8})/)||[])[1];
    if(date && (summary.startsWith("DO") || summary.startsWith("DR"))){
      days.push(`${date.slice(0,4)}-${date.slice(4,6)}-${date.slice(6,8)}`);
    }
  });
  return days;
}

async function analyze(){
  try{
    const text1=await readFile("file1");
    const text2=await readFile("file2");

    const off1=parseDaysOff(text1);
    const off2=parseDaysOff(text2);

    const together=off1.filter(d=>off2.includes(d));

    document.getElementById("result").innerHTML=`
      <div class="card">
        <h2>Resultado</h2>
        <div class="stat"><b>${together.length}</b><br>Días libres juntos</div>
        <p>${together.length ? together.join("<br>") : "No se encontraron días libres juntos."}</p>
      </div>
    `;
  }catch(err){
    alert(err);
  }
}
</script>
</body>
</html>
